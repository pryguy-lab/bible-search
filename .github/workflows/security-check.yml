name: Security Check

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  security-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        run: |
          npm start > server.log 2>&1 &

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time"
          cat server.log
          exit 1

      - name: Run security checks
        run: npm run security:check

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log

  security-check-redis:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      REDIS_URL: redis://localhost:6379
      LOG_REQUESTS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server with Redis
        run: |
          npm start > server-redis.log 2>&1 &

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time"
          cat server-redis.log
          exit 1

      - name: Run security checks with Redis
        run: npm run security:check

      - name: Upload Redis server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-redis-log
          path: server-redis.log
