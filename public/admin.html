<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Telemetry</title>
    <style>
      :root {
        --bg: #f1efe9;
        --card: #ffffff;
        --line: #d9d3c6;
        --ink: #20201e;
        --muted: #6d6a63;
        --accent: #1f5f4a;
        --warn: #9b3d2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Trebuchet MS", Verdana, sans-serif;
        background:
          radial-gradient(circle at 10% 0%, #ebe4d6 0, transparent 38%),
          radial-gradient(circle at 90% 0%, #e7e0d0 0, transparent 32%),
          var(--bg);
        color: var(--ink);
        padding: 1rem;
      }

      .app {
        width: min(980px, 100%);
        margin: 0 auto;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 14px 32px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .top {
        padding: 1rem 1rem 0.75rem;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 1.35rem;
      }

      .hint {
        margin: 0.5rem 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .controls {
        display: flex;
        gap: 0.6rem;
        margin-top: 0.85rem;
        flex-wrap: wrap;
      }

      button,
      a {
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        text-decoration: none;
        padding: 0.55rem 0.75rem;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .main {
        padding: 1rem;
        display: grid;
        gap: 0.8rem;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 0.7rem;
        background: #fdfcf9;
      }

      .status {
        font-weight: 700;
      }

      .status.ok {
        color: var(--accent);
      }

      .status.bad {
        color: var(--warn);
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.92rem;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        text-align: left;
        padding: 0.45rem;
      }

      td:nth-child(2),
      td:nth-child(3),
      td:nth-child(4) {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .empty {
        color: var(--muted);
      }

      code {
        background: #f3eee4;
        padding: 0.1rem 0.35rem;
        border-radius: 6px;
      }

      @media (max-width: 700px) {
        table {
          font-size: 0.84rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="top">
        <h1>Security Telemetry</h1>
        <p class="hint">
          This page is read-only. It expects your reverse proxy to inject
          <code>x-admin-key</code> when calling
          <code>/api/admin/telemetry</code>.
        </p>
        <div class="controls">
          <button id="refreshBtn" class="primary" type="button">Refresh</button>
          <button id="autoBtn" type="button">Start Auto Refresh</button>
          <a href="/">Back to Verse Explorer</a>
        </div>
      </section>

      <section class="main">
        <article class="panel">
          <div id="statusText" class="status">Loading telemetry...</div>
          <div id="metaText" class="hint"></div>
        </article>

        <article class="panel">
          <div class="hint">Top IP counters in current rolling window.</div>
          <table>
            <thead>
              <tr>
                <th>IP</th>
                <th>4xx</th>
                <th>429</th>
                <th>Window Remaining (ms)</th>
              </tr>
            </thead>
            <tbody id="counterRows"></tbody>
          </table>
        </article>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
