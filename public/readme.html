<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project README</title>
    <style>
      :root {
        --bg: #f4efe4;
        --card: #fffaf1;
        --line: #dfd1bb;
        --text: #201c17;
        --muted: #655f55;
        --accent: #8c4a2f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 10% 8%, #efe1bf 0%, transparent 28%),
          radial-gradient(circle at 90% 14%, #e5d5b7 0%, transparent 24%),
          var(--bg);
        color: var(--text);
        font-family: Georgia, "Times New Roman", serif;
        padding: 1.25rem;
      }

      .shell {
        width: min(980px, 100%);
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.9rem;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0.58rem 0.9rem;
        background: #d6d1c6;
        color: var(--text);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .back-link:hover {
        filter: brightness(0.95);
      }

      .status {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .markdown-body {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: clamp(1rem, 2.5vw, 2rem);
        box-shadow: 0 16px 40px rgba(50, 39, 22, 0.1);
        line-height: 1.7;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3 {
        line-height: 1.25;
        margin-top: 1.35em;
        margin-bottom: 0.55em;
      }

      .markdown-body h1 {
        margin-top: 0.2em;
      }

      .markdown-body p {
        margin: 0.8em 0;
      }

      .markdown-body .lead-ai-note {
        margin-top: 0.35rem;
        margin-bottom: 1.05rem;
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--accent);
      }

      .markdown-body ul {
        padding-left: 1.25rem;
      }

      .markdown-body pre {
        overflow-x: auto;
        padding: 0.8rem;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #f7efe1;
      }

      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
      }

      .markdown-body th,
      .markdown-body td {
        border: 1px solid var(--line);
        padding: 0.55rem 0.65rem;
        text-align: left;
        vertical-align: top;
      }

      .markdown-body th {
        background: #f4e7d4;
      }

      .markdown-body blockquote {
        margin: 1rem 0;
        padding: 0.15rem 0.95rem;
        border-left: 4px solid var(--accent);
        background: #fff3e7;
      }

      .markdown-body a {
        color: #315e49;
      }

      .markdown-body p img {
        margin: 0.12rem 0.2rem 0.12rem 0;
        vertical-align: middle;
      }

      .markdown-body code {
        font-family: Consolas, "Courier New", monospace;
      }

      .error {
        border-left: 4px solid var(--accent);
        padding: 0.75rem 0.95rem;
        background: #fff3e7;
      }

      @media (max-width: 720px) {
        body {
          padding: 0.8rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <a class="back-link" href="/">Back to Bible Verse Explorer</a>
        <span id="status" class="status">Loading README...</span>
      </div>
      <article id="readmeContainer" class="markdown-body"></article>
    </main>

    <script src="/readme.js"></script>
  </body>
</html>
